  <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top,#17130d 0%,#080808 40%,#000 100%);

font-family:"Montserrat",sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.card{
max-width:700px;

padding:60px;
text-align:center;

}

.check{
font-size:5rem;

}

h1{
font-family:"Cinzel",serif;
font-size:2.7rem;

p{

color:#d6d0c8;
margin-bottom:18px;
}

.phone{
font-size:1.2rem;
color:#f3cf77;
font-weight:600;
margin:30px 0;
}

a.button{
display:inline-block;
margin-top:20px;
padding:16px 36px;
background:linear-gradient(
135deg,
#d7a73f,
#f3cf77,
#9b711b
);
color:#080808;
text-decoration:none;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
transition:.25s;
}

a.button:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(215,167,63,.25);
}
